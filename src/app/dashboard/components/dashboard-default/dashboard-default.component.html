<mat-card class="filter-container">
	<div class="header">
		<button
			mat-icon-button
			color="primary"
			(click)="goBack()"
		>
			<mat-icon>arrow_back</mat-icon>
		</button>
		<h2>Donor Search</h2>
	</div>

	<div class="donor-filters">
		<mat-form-field
			appearance="outline"
			class="full-width"
		>
			<mat-label>Search Donor</mat-label>
			<input
				matInput
				[formControl]="searchDonorControl"
				placeholder="Search Donor"
			/>
		</mat-form-field>

		<mat-form-field
			appearance="outline"
			class="full-width"
		>
			<mat-label>Blood Group</mat-label>
			<mat-select [formControl]="bloodGroupControl">
				<mat-option
					*ngFor="
						let bg of [
							'A+',
							'A-',
							'B+',
							'B-',
							'O+',
							'O-',
							'AB+',
							'AB-'
						]
					"
					[value]="bg"
				>
					{{ bg }}
				</mat-option>
			</mat-select>
		</mat-form-field>

		<mat-checkbox [formControl]="availableDonorControl"
			>Only Available Donors</mat-checkbox
		>
	</div>

	<button
		mat-raised-button
		color="warn"
		class="full-width reset-button"
		(click)="resetFilters()"
	>
		Reset Filters
	</button>
</mat-card>

<div class="mat-elevation-z8 table-container">
	<table
		mat-table
		[dataSource]="dataSource"
		matSort
	>
		<ng-container matColumnDef="name">
			<th
				mat-header-cell
				*matHeaderCellDef
				mat-sort-header
			>
				Name
			</th>
			<td
				mat-cell
				*matCellDef="let donor"
			>
				{{ donor.name }}
			</td>
		</ng-container>

		<ng-container matColumnDef="address">
			<th
				mat-header-cell
				*matHeaderCellDef
				mat-sort-header
			>
				Address
			</th>
			<td
				mat-cell
				*matCellDef="let donor"
			>
				{{ donor.address }}
			</td>
		</ng-container>

		<ng-container matColumnDef="bloodGroup">
			<th
				mat-header-cell
				*matHeaderCellDef
				mat-sort-header
			>
				Blood Group
			</th>
			<td
				mat-cell
				*matCellDef="let donor"
			>
				{{ donor.bloodGroup }}
			</td>
		</ng-container>

		<ng-container matColumnDef="mobileNumber">
			<th
				mat-header-cell
				*matHeaderCellDef
				mat-sort-header
			>
				Mobile
			</th>
			<td
				mat-cell
				*matCellDef="let donor"
			>
				{{ donor.mobileNumber }}
			</td>
		</ng-container>

		<ng-container matColumnDef="lastDonationDate">
			<th
				mat-header-cell
				*matHeaderCellDef
				mat-sort-header
			>
				Last Donation
			</th>
			<td
				mat-cell
				*matCellDef="let donor"
				[ngClass]="{ unavailable: isDonorAvailable(donor) }"
			>
				{{ donor.lastDonationDate }}
			</td>
		</ng-container>

		<ng-container matColumnDef="totalDonations">
			<th
				mat-header-cell
				*matHeaderCellDef
				mat-sort-header
			>
				Total Donations
			</th>
			<td
				mat-cell
				*matCellDef="let donor"
			>
				{{ donor.totalDonations }}
			</td>
		</ng-container>

		<tr
			mat-header-row
			*matHeaderRowDef="displayedColumns"
		></tr>
		<tr
			mat-row
			*matRowDef="let donor; columns: displayedColumns"
			[ngClass]="{ 'unavailable-row': isDonorAvailable(donor) }"
			(click)="onRowClick(donor)"
			(keydown.enter)="onRowClick(donor)"
			tabindex="0"
		></tr>

		<tr
			class="mat-row"
			*matNoDataRow
		>
			<td
				class="mat-cell"
				colspan="6"
			>
				No donors found.
			</td>
		</tr>
	</table>

	<mat-paginator
		[pageSizeOptions]="[5, 10, 25]"
		showFirstLastButtons
	></mat-paginator>
</div>
