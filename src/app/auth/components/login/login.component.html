<div class="login-container">
    <mat-card class="login-card">
      <mat-card-title>Login</mat-card-title>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" required>
          <mat-error *ngIf="loginForm.controls['email'].hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="loginForm.controls['email'].hasError('email')">
            Enter a valid email
          </mat-error>
        </mat-form-field>
        
        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" required>
          <mat-error *ngIf="loginForm.controls['password'].hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="loginForm.controls['password'].hasError('minlength')">
            Minimum 6 characters required
          </mat-error>
        </mat-form-field>
        
        <!-- Submit Button -->
        <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="loginForm.invalid">
          Login
        </button>
        
      </form>
    </mat-card>
  </div>
